<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمة حذف الاسماء - نمبر بوك</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; padding: 10px; color: #333; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .price-box { font-size: 22px; font-weight: bold; margin: 10px 0; }
        .btn { display: block; padding: 12px; background: #e67e22; color: white; text-align: center; border-radius: 8px; text-decoration: none; font-weight: bold; }
        .review { font-size: 13px; border-bottom: 1px solid #f0f0f0; padding: 8px 0; }
        .stars { color: #f1c40f; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2 style="margin:0;">خدمة حذف الاسماء نهائياً</h2>
        <div class="price-box">
            <span style="text-decoration:line-through; color:#999; font-size:15px;">150 ر.س</span>
            <span style="color:#e67e22;">50 ر.س</span>
        </div>
        <a href="payment.html" class="btn">اشترك في الخدمة الآن</a>
    </div>

    <div class="card">
        <h3>التعليقات (50+)</h3>
        <div id="reviews"></div>
    </div>
</div>

<script>
    const reviewsDiv = document.getElementById('reviews');
    for(let i=1; i<=50; i++) {
        // تنويع النجوم بناءً على رقم التعليق
        let starCount = (i % 3 === 0) ? 3 : (i % 2 === 0) ? 4 : 5;
        let stars = "★".repeat(starCount) + "☆".repeat(5 - starCount);
        reviewsDiv.innerHTML += `
            <div class="review">
                <div class="stars">${stars}</div>
                <strong>عميل ${i}:</strong> خدمة ممتازة وسريعة جداً.
            </div>`;
    }
</script>
</body>
</html>
