<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمة حذف الاسماء</title>
    <style>
        /* ثيم احترافي غامق */
        body { font-family: sans-serif; background: #1a1a2e; padding: 15px; text-align: center; color: #fff; }
        .container { max-width: 400px; margin: auto; background: #16213e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid #0f3460; }
        
        .logo { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 10px; border: 3px solid #e94560; }
        .btn { display: block; background: #e94560; color: white; padding: 12px; border-radius: 8px; margin: 10px 0; border: none; width: 100%; cursor: pointer; font-weight: bold; }
        
        #payment-section { display: none; margin-top: 15px; padding: 15px; border: 1px solid #e94560; border-radius: 10px; text-align: right; background: #0f3460; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #0f3460; border-radius: 6px; background: #1a1a2e; color: white; box-sizing: border-box; }
        
        .stars-input { font-size: 28px; cursor: pointer; color: #533483; }
        .star-active { color: #f1c40f; }
        .comment-box { border-bottom: 1px solid #0f3460; padding: 10px 0; text-align: right; color: #ccc; font-size: 14px; }
        .hidden-comment { display: none; }
        h1, h2, h3 { color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <img src="1000219615_2.jpg" class="logo">
    <h2>خدمة حذف الاسماء</h2>
    <button class="btn" onclick="document.getElementById('payment-section').style.display='block'">ادفع الآن</button>

    <div id="payment-section">
        <h3 style="text-align: center;">بيانات التحويل البنكي</h3>
        <p>البنك: <strong>بنك الجزيرة</strong></p>
        <p>الآيبان: SA05 6010 0001 0813 1434 0002</p>
        <hr>
        <input type="text" id="name" placeholder="الاسم الكريم">
        <input type="text" id="phone" placeholder="رقم الجوال المطلوب حذفه">
        <button class="btn" style="background:#27ae60;" onclick="alert('تم الطلب!')">تأكيد إتمام الحوالة</button>
    </div>

    <h3>آراء العملاء</h3>
    <div id="comments-list">
        <div class="comment-box">⭐⭐⭐⭐⭐ <strong>سلطان:</strong> خدمة سريعة جداً.</div>
        <div class="comment-box">⭐⭐⭐⭐⭐ <strong>مريم:</strong> تم الحذف بنجاح.</div>
    </div>
    <button id="more-btn" class="btn" style="background:#533483;" onclick="showMore()">قراءة المزيد من التعليقات</button>

    <div style="margin-top:20px; border-top:1px solid #0f3460; padding-top:15px;">
        <h4>أضف تقييمك:</h4>
        <div class="stars-input" id="stars">
            <span onclick="setStars(1)">★</span><span onclick="setStars(2)">★</span>
            <span onclick="setStars(3)">★</span><span onclick="setStars(4)">★</span>
            <span onclick="setStars(5)">★</span>
        </div>
        <input type="text" id="user-name" placeholder="اسمك">
        <textarea id="user-comment" placeholder="اكتب رأيك هنا..."></textarea>
        <button class="btn" style="background:#34495e;" onclick="addComment()">نشر التعليق</button>
    </div>
</div>

<script>
    // إضافة 48 تعليقاً برمجياً متنوعاً
    const msgs = ["ممتاز جداً", "خدمة سريعة", "ثقة ومصداقية", "تم الحذف بنجاح", "شغل احترافي"];
    for(let i=1; i<=48; i++) {
        let div = document.createElement('div');
        div.className = 'comment-box hidden-comment';
        div.innerHTML = '⭐⭐⭐⭐⭐ <strong>عميل ' + i + ':</strong> ' + msgs[i % msgs.length];
        document.getElementById('comments-list').appendChild(div);
    }

    function showMore() {
        document.querySelectorAll('.hidden-comment').forEach(el => el.style.display = 'block');
        document.getElementById('more-btn').style.display = 'none';
    }

    let currentRating = 5;
    function setStars(n) {
        currentRating = n;
        document.querySelectorAll('.stars-input span').forEach((s, i) => s.className = i < n ? 'star-active' : '');
    }

    function addComment() {
        let name = document.getElementById('user-name').value;
        let comment = document.getElementById('user-comment').value;
        if(name && comment) {
            let div = document.createElement('div');
            div.className = 'comment-box';
            div.innerHTML = '⭐'.repeat(currentRating) + ' <strong>' + name + ':</strong> ' + comment;
            document.getElementById('comments-list').prepend(div);
            alert("تم نشر تقييمك!");
        }
    }
</script>
</body>
</html>
