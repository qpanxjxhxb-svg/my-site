<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمة حذف الاسماء - نمبر بوك المملكة SA</title>
    <style>
        body { font-family: sans-serif; background: #f9f9f9; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { width: 120px; border-radius: 10px; margin-bottom: 10px; }
        .price { font-size: 28px; color: #e74c3c; font-weight: bold; }
        .old-price { text-decoration: line-through; color: #999; font-size: 20px; }
        .btn { display: block; background: #27ae60; color: white; padding: 15px; text-align: center; text-decoration: none; border-radius: 5px; margin: 10px 0; font-weight: bold; border: none; width: 100%; cursor: pointer; }
        
        /* تنسيق قسم الدفع الجديد */
        #payment-section { display: none; margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; text-align: right; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        footer { margin-top: 30px; font-size: 14px; border-top: 1px solid #eee; padding-top: 10px; }
        .comment-box { border-bottom: 1px solid #eee; padding: 10px 0; text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <img src="1000219615_2.jpg" class="logo">
    <h1>خدمة حذف الاسماء</h1>
    <p class="old-price">150 ريال</p>
    <p class="price">50 ريال</p>
    
    <button class="btn" onclick="document.getElementById('payment-section').style.display='block'">ادفع الآن</button>

    <div id="payment-section">
        <h3>بيانات التحويل البنكي</h3>
        <p>البنك: مصرف الراجحي</p>
        <p>الآيبان: SA05 6010 0001 0813 1434 0002</p>
        <hr>
        <input type="text" id="name" placeholder="اسمك الكريم">
        <input type="text" id="phone" placeholder="رقم الجوال المراد حذف اسمه">
        <button class="btn" style="background:#2980b9;" onclick="alert('تم استلام طلبك، سنقوم بالتنفيذ فور التأكد من الحوالة.')">تأكيد إرسال الحوالة</button>
    </div>
    
    <h3>آراء العملاء</h3>
    <div class="comment-box">⭐ محمد: خدمة ممتازة وسريعة.</div>
    <div class="comment-box">⭐ سارة: تم الحذف بنجاح، شكراً لكم.</div>

    <footer>
        <p>الدعم الفني: 0531156673</p>
    </footer>
</div>

</body>
</html>
