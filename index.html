<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمة حذف الاسماء - نمبر بوك</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .price { font-size: 28px; color: #e67e22; font-weight: bold; margin: 10px 0; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { display: block; width: 100%; padding: 15px; margin-top: 10px; border-radius: 8px; text-align: center; font-weight: bold; border: none; cursor: pointer; text-decoration: none; color: white; }
        .btn-buy { background: #e67e22; }
        .stars { color: #f1c40f; font-size: 20px; }
        .review { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>خدمة حذف الاسماء نهائياً</h1>
        <div class="price">50 ر.س</div>
        <input type="text" placeholder="رقم الهاتف المراد حذفه">
        <textarea placeholder="أي ملاحظات إضافية؟"></textarea>
        <a href="https://wa.me/966531156673" class="btn btn-buy">الشراء الآن عبر واتساب</a>
    </div>

    <div class="card">
        <h3>تقييمات العملاء</h3>
        <div class="stars">★★★★★ (4.9)</div>
        <div class="review"><strong>محمد:</strong> خدمة سريعة جداً وتم الحذف في دقائق!</div>
        <div class="review"><strong>سارة:</strong> شكراً لكم، اختفى اسمي تماماً.</div>
    </div>
</div>

</body>
</html>
