<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حذف اسماء نبر بوك</title>
<style>
body { font-family: sans-serif; background: #1a1a2e; padding: 15px; text-align: center; color: #fff; }
.container { max-width: 400px; margin: auto; background: #16213e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
.logo { width: 100%; height: auto; border-radius: 8px; margin-bottom: 15px; display: block; }
.btn { display: block; background: #e94560; color: white; padding: 12px; border-radius: 8px; margin: 10px 0; border: none; width: 100%; cursor: pointer; }
.price-box { margin: 15px 0; padding: 10px; background: #0f3460; border-radius: 8px; }
.old-price { text-decoration: line-through; color: #888; font-size: 14px; margin-left: 10px; }
.new-price { color: #27ae60; font-size: 24px; font-weight: bold; }
#payment-section { display: none; margin-top: 15px; padding: 15px; border: 1px solid #e94560; border-radius: 10px; }
input, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #0f3460; border-radius: 6px; background: #1a1a2e; color: #fff; }
.stars-input { font-size: 28px; cursor: pointer; color: #533483; }
.comment-box { border-bottom: 1px solid #0f3460; padding: 10px 0; text-align: right; color: #ccc; font-size: 14px; }
h1, h2, h3 { color: #fff; }
</style>
</head>
<body>

<div class="container">
    <img src="https://cdn-icons-png.flaticon.com/512/2910/2910791.png" alt="شعار الخدمة" class="logo">
    <h2>خدمة حذف الاسماء</h2>
    <div class="price-box">
        <span class="old-price">150 ريال</span>
        <span class="new-price">50 ريال</span>
    </div>
    <button class="btn" onclick="document.getElementById('payment-section').style.display='block'">ادفع الآن</button>
    <div id="payment-section">
        <h3>يرجى التحويل على الحساب التالي:</h3>
        <p><strong>اسم البنك:</strong> الراجحي</p>
        <p><strong>الآيبان:</strong> <strong>SA05 6010 0001 0813 1434 0002</strong></p>
        <hr>
        <input type="text" id="name" placeholder="اسم الكريم">
        <input type="text" id="phone" placeholder="رقم الجوال المطلوب حذفه">
        <button class="btn" style="background:#27ae60;" onclick="alert('جاري التأكد من حوالتكم وسنقوم بالعمل فور التحقق من إيداعها')">إرسال</button>
    </div>
    <h3>آراء الزبائن</h3>
    <div id="comments-list">
        <div class="comment-box">★★★★★ <strong>خدمة سريعة جداً</strong></div>
        <div class="comment-box">★★★★★ <strong>تم الحذف بنجاح</strong></div>
    </div>
    <button id="more-btn" class="btn" style="background:#533483;" onclick="showMore()">قراءة المزيد من التعليقات</button>
    <div style="margin-top:20px; border-top:1px solid #0f3460; padding-top:15px;">
        <p>أضف تقييمك:</p>
        <div class="stars-input" id="stars">
            <span onclick="setStars(1)">★</span><span onclick="setStars(2)">★</span><span onclick="setStars(3)">★</span><span onclick="setStars(4)">★</span><span onclick="setStars(5)">★</span>
        </div>
        <input type="text" id="user-name" placeholder="اسمك">
        <textarea id="user-comment" placeholder="اكتب رأيك..."></textarea>
        <button class="btn" style="background:#34495e;" onclick="addComment()">نشر التعليق</button>
    </div>
    <div style="margin-top: 30px; padding: 15px; background: #0f3460; border-radius: 10px;">
        <p>لأي استفسار تواصل عبر الواتساب:</p>
        <a href="https://wa.me/966531156673" style="color: #27ae60; font-weight: bold; font-size: 18px;">0531156673</a>
    </div>
</div>

<script>
    function showMore() { alert("لا توجد تعليقات إضافية حالياً"); }
    function setStars(n) {
        let stars = document.getElementById('stars').getElementsByTagName('span');
        for (let i = 0; i < stars.length; i++) {
            stars[i].style.color = (i < n) ? '#f1c40f' : '#533483';
        }
    }
    function addComment() {
        let name = document.getElementById('user-name').value;
        let comment = document.getElementById('user-comment').value;
        if(name && comment) {
            let div = document.createElement('div');
            div.className = 'comment-box';
            div.innerHTML = '<strong>' + name + ':</strong> ' + comment;
            document.getElementById('comments-list').appendChild(div);
            document.getElementById('user-name').value = '';
            document.getElementById('user-comment').value = '';
            alert("تم نشر تعليقك بنجاح!");
        } else {
            alert("يرجى كتابة الاسم والتعليق أولاً");
        }
    }
</script>

<!-- كود العداد -->
<script src="https://cdn.counter.dev/script.js" data-id="03f41621-afcd-4df4-90a9-af09acb56058" data-utcoffset="3"></script>
</body>
</html>
