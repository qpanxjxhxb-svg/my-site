<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>خدمة حذف الاسماء - نمبر بوك</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 10px; color: #333; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .price-box { font-size: 20px; font-weight: bold; }
        .btn { display: block; padding: 10px; background: #e67e22; color: white; text-align: center; border-radius: 5px; text-decoration: none; margin-top: 10px; }
        .review { font-size: 12px; border-bottom: 1px solid #eee; padding: 5px 0; }
    </style>
</head>
<body>
<div class="card">
    <h2 style="margin-top:0;">خدمة حذف الاسماء</h2>
    <div class="price-box">
        <span style="text-decoration:line-through; color:#999; font-size:14px;">150 ر.س</span>
        <span style="color:#e67e22;">50 ر.س</span>
    </div>
    <a href="payment.html" class="btn">اشترك في الخدمة الآن</a>
</div>

<div class="card">
    <h3>تقييمات العملاء (50 تعليق)</h3>
    <div id="reviews"></div>
</div>

<script>
    const reviewsDiv = document.getElementById('reviews');
    for(let i=1; i<=50; i++) {
        reviewsDiv.innerHTML += '<div class="review">⭐⭐⭐⭐⭐ <strong>عميل ' + i + ':</strong> خدمة احترافية وسريعة جداً، شكراً لكم!</div>';
    }
</script>
<p style="text-align:center; font-size:12px;">الدعم الفني: 966531156673</p>
</body>
</html>
