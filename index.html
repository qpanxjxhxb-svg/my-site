<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>خدمة حذف الاسماء</title>
    <style>
        body { font-family: sans-serif; background: #f9f9f9; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { display: block; background: #27ae60; color: white; padding: 15px; border-radius: 5px; margin: 10px 0; border: none; width: 100%; cursor: pointer; font-weight: bold; }
        #payment-section { display: none; margin-top: 20px; padding: 15px; border: 2px solid #27ae60; border-radius: 8px; text-align: right; background: #f0fdf4; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .stars-input { font-size: 30px; cursor: pointer; color: #ccc; }
        .star-active { color: #f1c40f; }
        .comment-box { border-bottom: 1px solid #eee; padding: 10px 0; text-align: right; font-size: 14px; }
        #comments-list { max-height: 400px; overflow-y: auto; border: 1px solid #eee; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>خدمة حذف الاسماء</h1>
    <button class="btn" onclick="document.getElementById('payment-section').style.display='block'">ادفع الآن</button>

    <div id="payment-section">
        <h3 style="text-align: center;">بيانات التحويل البنكي</h3>
        <p>البنك: <strong>بنك الجزيرة</strong></p>
        <p>الآيبان: SA05 6010 0001 0813 1434 0002</p>
        <hr>
        <input type="text" id="name" placeholder="الاسم الكريم">
        <input type="text" id="phone" placeholder="رقم الجوال المطلوب حذفه">
        <button class="btn" style="background:#2980b9;" onclick="alert('تم استلام طلبك، سنقوم بالتنفيذ فور التحقق من الحوالة.')">تأكيد إتمام الحوالة</button>
    </div>

    <h3>آراء العملاء</h3>
    <div id="comments-list"></div>

    <div style="margin-top:30px; border-top:2px solid #eee; padding-top:20px;">
        <h4>أضف تقييمك:</h4>
        <div class="stars-input" id="stars">
            <span onclick="setStars(1)">★</span><span onclick="setStars(2)">★</span>
            <span onclick="setStars(3)">★</span><span onclick="setStars(4)">★</span>
            <span onclick="setStars(5)">★</span>
        </div>
        <input type="text" id="user-name" placeholder="اسمك">
        <textarea id="user-comment" placeholder="اكتب رأيك هنا..."></textarea>
        <button class="btn" style="background:#34495e;" onclick="addComment()">نشر التعليق</button>
    </div>
</div>

<script>
    for(let i=1; i<=50; i++) {
        let div = document.createElement('div');
        div.className = 'comment-box';
        div.innerHTML = '<span style="color:#f1c40f;">★★★★★</span> <strong>عميل ' + i + ':</strong> خدمة ممتازة وسريعة.';
        document.getElementById('comments-list').appendChild(div);
    }
    let currentRating = 5;
    function setStars(n) {
        currentRating = n;
        let stars = document.querySelectorAll('.stars-input span');
        stars.forEach((s, i) => s.className = i < n ? 'star-active' : '');
    }
    function addComment() {
        let name = document.getElementById('user-name').value;
        let comment = document.getElementById('user-comment').value;
        if(name && comment) {
            let div = document.createElement('div');
            div.className = 'comment-box';
            let starsStr = '★'.repeat(currentRating);
            div.innerHTML = '<span style="color:#f1c40f;">' + starsStr + '</span> <strong>' + name + ':</strong> ' + comment;
            document.getElementById('comments-list').prepend(div);
            alert("شكراً لك!");
        } else { alert("يرجى إدخال البيانات"); }
    }
</script>
</body>
</html>
