<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>خدمة حذف الاسماء - نمبر بوك</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f9f9f9; padding: 20px; color: #333; text-align: center; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .old-price { text-decoration: line-through; color: #999; font-size: 18px; }
        .new-price { color: #e67e22; font-weight: bold; font-size: 32px; display: block; }
        .btn { display: block; width: 100%; padding: 18px; background: #e67e22; color: white; border: none; border-radius: 10px; font-size: 18px; text-align: center; text-decoration: none; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>خدمة حذف الاسماء نهائياً</h1>
            <div class="price-box">
                <span class="old-price">150 ر.س</span>
                <span class="new-price">50 ر.س</span>
            </div>
            <a href="payment.html" class="btn">اشترك في الخدمة الآن</a>
            <p style="margin-top:40px; font-size: 13px; color: #666;">الدعم الفني: 966531156673</p>
        </div>
    </div>
</body>
</html>
