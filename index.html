<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>خدمة حذف الاسماء - نمبر بوك</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f9f9f9; padding: 15px; color: #333; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .old-price { text-decoration: line-through; color: #999; font-size: 16px; }
        .new-price { color: #e67e22; font-weight: bold; font-size: 28px; display: block; }
        .btn { display: block; width: 100%; padding: 15px; background: #e67e22; color: white; text-align: center; border-radius: 10px; font-weight: bold; text-decoration: none; margin-top: 10px; }
        .review { font-size: 13px; border-bottom: 1px solid #eee; padding: 8px 0; }
        .support { text-align: center; font-size: 12px; color: #888; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>خدمة حذف الاسماء نهائياً</h1>
        <span class="old-price">150 ر.س</span>
        <span class="new-price">50 ر.س</span>
        <a href="payment.html" class="btn">اشترك في الخدمة الآن</a>
    </div>

    <div class="card">
        <h3>تقييمات العملاء</h3>
        <div class="review">★★★★★ (4.9) - خدمة سريعة جداً!</div>
        <div class="review">★★★★★ - تم حذف اسمي في دقائق، شكراً.</div>
    </div>

    <div class="support">
        <p>للدعم الفني والاستفسارات:</p>
        <p><strong>966531156673</strong></p>
    </div>
</div>
</body>
</html>
